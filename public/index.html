<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Work+Sans:wght@400;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/PiKonen/PINX-design-system@main/components/button.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/PiKonen/PINX-design-system@main/components/page-indicator.css" />
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>

<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar__time">10:00 AM</span>
    <div class="status-bar__icons">
      <img class="status-bar__signal"
           src="https://www.figma.com/api/mcp/asset/9cbb0e4c-e737-4144-a209-a44c4f959b59"
           alt="Signal" />
      <img class="status-bar__wifi"
           src="https://www.figma.com/api/mcp/asset/bd3e3e91-3101-4a2e-8019-857d5ee82f77"
           alt="Wi-Fi" />
      <img class="status-bar__battery"
           src="https://www.figma.com/api/mcp/asset/3a8a743b-d710-4505-a0ac-286673c09e33"
           alt="Battery" />
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <span class="nav-bar__title">Welcome</span>
  </div>

  <!-- Carousel -->
  <div class="carousel">
    <div class="carousel__image">
      <img src="https://www.figma.com/api/mcp/asset/ba0eaa2f-cbf7-495d-9db5-1a0598642131"
           alt="Illustration of a character starting a journey" />
    </div>

    <div class="carousel__text">
      <h1>Discover new features</h1>
      <p class="carousel__subtext">Learn how to make the most of our app with these quick tips.</p>
    </div>

    <!-- PINX page-indicator component -->
    <div class="page-indicator" role="tablist" aria-label="Onboarding step 1 of 3">
      <div class="page-indicator__dot page-indicator__dot--active" role="tab" aria-selected="true"  aria-label="Step 1"></div>
      <div class="page-indicator__dot"                             role="tab" aria-selected="false" aria-label="Step 2"></div>
      <div class="page-indicator__dot"                             role="tab" aria-selected="false" aria-label="Step 3"></div>
    </div>
  </div>

  <!-- Bottom bar — PINX .btn component -->
  <div class="bottom-bar">
    <button class="btn" type="button">SKIP</button>
  </div>

</div>

</body>
</html>
